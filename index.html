<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OmegaMesh Ultra HUD Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: gold;
    }

    .player {
      width: 100%;
      max-width: 420px;
      background: #000;
      padding: 22px;
      border-radius: 20px;
      box-shadow: 0 0 35px rgba(255, 215, 0, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(255, 215, 0, 0.25);
      overflow: hidden;
      position: relative;
    }

    /* Double OmegaMesh rotating rings */
    .ring, .ring2 {
      position: absolute;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      border: 2px solid rgba(255, 215, 0, 0.15);
      pointer-events: none;
      top: -180px;
      left: -180px;
    }

    .ring { animation: spin 18s linear infinite; }
    .ring2 { animation: spinReverse 26s linear infinite; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    /* HUD Title Bar */
    .hud {
      width: 100%;
      padding: 10px 0;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
      color: gold;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
      border-bottom: 1px solid rgba(255, 215, 0, 0.25);
      margin-bottom: 12px;
      overflow: hidden;
      white-space: nowrap;
    }

    .marquee {
      display: inline-block;
      animation: scroll 9s linear infinite;
    }

    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* Full playlist mode */
    .mask {
      width: 100%;
      height: auto;
      overflow: visible;
      border-radius: 12px;
    }

    iframe {
      width: 100%;
      height: 600px; /* full playlist height */
      border: none;
      transform: none; /* no crop */
    }

    /* Gold waveform animation */
    .wave {
      margin-top: 14px;
      width: 100px;
      height: 20px;
      display: flex;
      justify-content: space-between;
    }

    .bar {
      width: 6px;
      background: gold;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { height: 6px; }
      50% { height: 20px; }
    }

    /* Gold progress bar (visual only) */
    .progress {
      width: 100%;
      height: 6px;
      background: rgba(255, 215, 0, 0.15);
      border-radius: 4px;
      margin-top: 14px;
      overflow: hidden;
    }

    .progress-fill {
      width: 40%;
      height: 100%;
      background: gold;
      box-shadow: 0 0 12px gold;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { width: 20%; }
      50% { width: 80%; }
      100% { width: 20%; }
    }
  </style>
</head>

<body>
  <div class="player">

    <div class="ring"></div>
    <div class="ring2"></div>

    <!-- HUD ABOVE PLAYER -->
    <div class="hud">
      <span class="marquee">My Playlist #2 — OmegaMesh HUD Player</span>
    </div>

    <div class="mask">
      <iframe
        src="https://open.spotify.com/embed/playlist/0HmH0wbXVrgAEOukNwAOcI?utm_source=generator&theme=0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
      </iframe>
    </div>

    <div class="wave">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="progress">
      <div class="progress-fill"></div>
    </div>

  </div>
</body>
</html>
